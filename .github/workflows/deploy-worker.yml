name: Deploy Worker to Fly.io

on:
  push:
    branches: [master]
    paths:
      - "apps/worker/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --app dropflow-worker --config apps/worker/fly.toml --dockerfile apps/worker/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
